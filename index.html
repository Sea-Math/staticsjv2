<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser</title>
    <link rel="stylesheet" href="style.css">
    <script type="module">
        import * as BareMux from './vendor/bare-mux/index.mjs';
        window.BareMux = BareMux;
    </script>
    <script src="./script.js" defer></script>
</head>

<body>
    <div id="app">
        <div class="message-container" style="display:flex; position:fixed; inset:0;">
            <div class="message-content">
                <svg width="120" height="24" viewBox="0 0 120 24" aria-hidden="true" style="display:block;margin:0 auto 20px;">
                    <line x1="6" y1="12" x2="114" y2="12" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                        <animate attributeName="stroke-dasharray" values="0,120;60,60;120,0" dur="1.4s" repeatCount="indefinite" />
                    </line>
                </svg>
                <h1>Starting browser...</h1>
                <p>Loading scripts from this repo. If blocked, fallback mode will open automatically.</p>
            </div>
        </div>
    </div>

    <div class="wisp-settings-modal hidden" id="wisp-settings-modal">
        <div class="settings-card">
            <div class="settings-header">
                <h2><i class="fa-solid fa-server"></i> Proxy Settings</h2>
                <button class="close-btn" id="close-wisp-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="settings-content">
                <div class="section-title"><i class="fa-solid fa-cloud"></i> Select Server</div>
                <div class="server-list" id="server-list"></div>
                <div class="section-title"><i class="fa-solid fa-plus-circle"></i> Custom Server</div>
                <div class="custom-input-group">
                    <input type="text" id="custom-wisp-input" placeholder="wss://your-wisp-server.com/wisp/">
                    <button id="save-custom-wisp"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            <div class="settings-footer">
                Lower ping = faster browsing
            </div>
        </div>
    </div>
</body>

</html>
